<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – CARTELLO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="../index.html" class="text-3xl font-black tracking-tight">CARTELLO</a>
      <p class="text-gray-500 mt-2 text-sm">Welcome back! Please sign in to continue.</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
      <h1 class="text-2xl font-bold mb-6">Sign In</h1>

      <!-- Error Banner -->
      <div id="formError" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
        <i class="fas fa-exclamation-circle"></i>
        <span id="formErrorText"></span>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="email" id="email" name="email" required autocomplete="email"
              placeholder="you@example.com"
              class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-black transition placeholder-gray-400">
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <a href="#" class="text-xs text-gray-500 hover:text-black transition">Forgot password?</a>
          </div>
          <div class="relative">
            <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" id="password" name="password" required autocomplete="current-password"
              placeholder="••••••••"
              class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-black transition placeholder-gray-400">
            <button type="button" id="togglePass" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black transition text-sm">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit"
          class="w-full bg-black text-white py-3.5 rounded-xl font-semibold hover:bg-gray-800 transition flex items-center justify-center gap-2">
          Sign In
        </button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
        <div class="relative text-center"><span class="bg-white px-3 text-xs text-gray-400">or</span></div>
      </div>

      <p class="text-center text-sm text-gray-600">
        Don't have an account?
        <a href="register.html" class="font-semibold text-black hover:underline">Sign up free</a>
      </p>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      By signing in, you agree to our
      <a href="#" class="underline">Terms</a> and <a href="#" class="underline">Privacy Policy</a>.
    </p>
  </div>

  <script>
    const API = 'http://localhost:5000/api';

    // Toggle password visibility
    document.getElementById('togglePass').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    // Login Form
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('button[type="submit"]');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBanner = document.getElementById('formError');
      const errorText = document.getElementById('formErrorText');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
      errorBanner.classList.add('hidden');

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = data.user.role === 'admin' ? '/pages/admin/dashboard.html' : (redirect || '/index.html');
      } catch (err) {
        errorText.textContent = err.message;
        errorBanner.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    });
  </script>
</body>
</html>
