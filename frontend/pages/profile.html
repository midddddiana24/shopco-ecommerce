<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – CARTELLO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <nav class="container mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../index.html" class="text-2xl font-black tracking-tight">CARTELLO</a>
      <div class="flex items-center gap-4">
        <a href="cart.html" class="relative">
          <i class="fas fa-shopping-cart text-xl"></i>
          <span id="cartCount" class="absolute -top-2 -right-2 bg-black text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">0</span>
        </a>
        <a href="profile.html" id="userIcon" class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-shadow shadow-sm">
          <i class="fas fa-user text-xl"></i>
        </a>
      </div>
    </nav>
  </header>

  <main class="container mx-auto px-4 py-10 max-w-4xl">
    <nav class="text-sm text-gray-500 mb-6 flex items-center gap-2">
      <a href="../index.html" class="hover:text-black">Home</a>
      <i class="fas fa-chevron-right text-xs"></i>
      <span class="text-black font-medium">My Profile</span>
    </nav>

    <div id="profileLoader" class="flex justify-center py-16">
      <i class="fas fa-spinner fa-spin text-4xl text-gray-300"></i>
    </div>

    <section id="profileContent" class="hidden bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
      <div class="flex flex-col lg:flex-row gap-8">
        <div class="w-full lg:w-1/3 bg-gray-50 rounded-3xl p-6 text-center">
          <div class="mx-auto mb-6 w-28 h-28 rounded-full overflow-hidden bg-black flex items-center justify-center text-white text-3xl font-bold" id="avatarCircle">U</div>
          <h1 id="profileName" class="text-2xl font-bold mb-1"></h1>
          <p id="profileRole" class="text-sm text-gray-500 mb-4"></p>
          <button onclick="logout()" class="w-full bg-black text-white py-3 rounded-full font-semibold hover:bg-gray-800 transition">Logout</button>
        </div>

        <div class="w-full lg:w-2/3">
          <h2 class="text-xl font-bold mb-4">Account Information</h2>
          <form id="profileForm" class="space-y-5">
            <div>
              <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
              <input id="fullName" type="text" required class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm focus:border-black focus:ring-0" />
            </div>
            <div>
              <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
              <input id="email" type="email" required class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm focus:border-black focus:ring-0" />
            </div>
            <div>
              <label for="phone" class="block text-sm font-medium text-gray-700 mb-1.5">Phone</label>
              <input id="phone" type="text" class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm focus:border-black focus:ring-0" />
            </div>
            <div>
              <label for="address" class="block text-sm font-medium text-gray-700 mb-1.5">Address</label>
              <input id="address" type="text" class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm focus:border-black focus:ring-0" />
            </div>
            <div class="grid md:grid-cols-2 gap-4">
              <div>
                <label for="city" class="block text-sm font-medium text-gray-700 mb-1.5">City</label>
                <input id="city" type="text" class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm focus:border-black focus:ring-0" />
              </div>
              <div>
                <label for="country" class="block text-sm font-medium text-gray-700 mb-1.5">Country</label>
                <input id="country" type="text" class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm focus:border-black focus:ring-0" />
              </div>
            </div>
            <div>
              <label for="zipCode" class="block text-sm font-medium text-gray-700 mb-1.5">ZIP / Postal Code</label>
              <input id="zipCode" type="text" class="w-full rounded-2xl border border-gray-200 px-4 py-3 text-sm focus:border-black focus:ring-0" />
            </div>
            <button type="submit" class="w-full bg-black text-white py-3 rounded-full font-semibold hover:bg-gray-800 transition">Save Changes</button>
            <p id="profileMessage" class="text-sm text-center text-green-600 hidden"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-white border-t mt-16 py-8">
    <div class="container mx-auto px-4 text-center text-sm text-gray-500">CARTELLO © 2024–2025</div>
  </footer>

  <script>
    const API = 'http://localhost:5000/api';

    function requireAuth() {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
        return false;
      }
      return true;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function showMessage(message, success = true) {
      const el = document.getElementById('profileMessage');
      el.textContent = message;
      el.className = success ? 'text-sm text-center text-green-600' : 'text-sm text-center text-red-600';
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    async function fetchProfile() {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API}/auth/me`, {
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Unable to load profile');

        const user = data.user;
        const displayName = user.fullName || user.name || 'User';
        document.getElementById('profileName').textContent = displayName;
        document.getElementById('profileRole').textContent = user.role === 'admin' ? 'Administrator' : 'Customer';
        document.getElementById('avatarCircle').textContent = displayName.charAt(0).toUpperCase();

        document.getElementById('fullName').value = user.fullName || user.name || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('phone').value = user.phone || '';
        document.getElementById('address').value = user.address || '';
        document.getElementById('city').value = user.city || '';
        document.getElementById('country').value = user.country || '';
        document.getElementById('zipCode').value = user.zipCode || '';

        document.getElementById('profileContent').classList.remove('hidden');
      } catch (error) {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      } finally {
        document.getElementById('profileLoader').classList.add('hidden');
      }
    }

    async function updateProfile(payload) {
      const token = localStorage.getItem('token');
      const response = await fetch(`${API}/auth/profile`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.message || 'Failed to update profile');
      return data.user;
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const count = cart.reduce((total, item) => total + item.quantity, 0);
      const cartCountElement = document.getElementById('cartCount');
      if (cartCountElement) cartCountElement.textContent = count;
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAuth()) return;
      updateCartCount();
      fetchProfile();

      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          fullName: document.getElementById('fullName').value.trim(),
          email: document.getElementById('email').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          address: document.getElementById('address').value.trim(),
          city: document.getElementById('city').value.trim(),
          country: document.getElementById('country').value.trim(),
          zipCode: document.getElementById('zipCode').value.trim()
        };

        try {
          const user = await updateProfile(payload);
          const savedUser = { ...user, name: user.fullName || user.name };
          localStorage.setItem('user', JSON.stringify(savedUser));
          document.getElementById('profileName').textContent = savedUser.name;
          showMessage('Profile updated successfully!', true);
        } catch (error) {
          showMessage(error.message, false);
        }
      });
    });
  </script>
</body>
</html>
