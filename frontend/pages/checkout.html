<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – CARTELLO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">

  <header class="bg-white shadow-sm">
    <nav class="container mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../index.html" class="text-2xl font-black tracking-tight">CARTELLO</a>
      <div class="flex items-center gap-2 text-sm text-gray-500">
        <i class="fas fa-lock text-green-500"></i> Secure Checkout
      </div>
    </nav>
    <!-- Steps -->
    <div class="border-t">
      <div class="container mx-auto px-4 py-3 flex items-center gap-2 text-sm overflow-x-auto">
        <a href="cart.html" class="text-gray-400 hover:text-black flex items-center gap-1">
          <span class="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-xs">1</span> Cart
        </a>
        <i class="fas fa-chevron-right text-xs text-gray-300"></i>
        <span class="flex items-center gap-1 font-semibold text-black">
          <span class="w-5 h-5 rounded-full bg-black text-white flex items-center justify-center text-xs">2</span> Checkout
        </span>
        <i class="fas fa-chevron-right text-xs text-gray-300"></i>
        <span class="text-gray-400 flex items-center gap-1">
          <span class="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-xs">3</span> Confirmation
        </span>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-10">
    <div class="max-w-5xl mx-auto grid lg:grid-cols-5 gap-8">

      <!-- Form -->
      <div class="lg:col-span-3 space-y-6">
        <form id="checkoutForm">

          <!-- Shipping Info -->
          <div class="bg-white rounded-3xl border border-gray-200 p-6">
            <h2 class="font-bold text-lg mb-5 flex items-center gap-2">
              <i class="fas fa-map-marker-alt text-gray-400"></i> Shipping Information
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Full Name *</label>
                <input type="text" id="fullName" required placeholder="Juan dela Cruz"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-black transition">
              </div>
              <div class="sm:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Street Address *</label>
                <input type="text" id="address" required placeholder="123 Main St, Apt 4B"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-black transition">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">City *</label>
                <input type="text" id="city" required placeholder="Iloilo City"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-black transition">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Postal Code *</label>
                <input type="text" id="postalCode" required placeholder="5000"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-black transition">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Country *</label>
                <select id="country" required class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-black transition bg-white">
                  <option value="">Select Country</option>
                  <option value="Philippines">Philippines</option>
                  <option value="United States">United States</option>
                  <option value="United Kingdom">United Kingdom</option>
                  <option value="Australia">Australia</option>
                  <option value="Canada">Canada</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone Number *</label>
                <input type="tel" id="phone" required placeholder="+63 912 345 6789"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-black transition">
              </div>
            </div>
          </div>

          <!-- Payment -->
          <div class="bg-white rounded-3xl border border-gray-200 p-6">
            <h2 class="font-bold text-lg mb-5 flex items-center gap-2">
              <i class="fas fa-credit-card text-gray-400"></i> Payment Method
            </h2>
            <div class="space-y-3">
              <label class="flex items-center gap-4 p-4 border-2 border-black rounded-2xl cursor-pointer bg-gray-50">
                <input type="radio" name="payment" value="COD" checked class="accent-black">
                <div class="flex items-center gap-3">
                  <i class="fas fa-money-bill-wave text-green-600 text-xl"></i>
                  <div>
                    <p class="font-semibold text-sm">Cash on Delivery</p>
                    <p class="text-xs text-gray-500">Pay when your order arrives</p>
                  </div>
                </div>
              </label>
              <label class="flex items-center gap-4 p-4 border-2 border-gray-200 rounded-2xl cursor-pointer hover:border-gray-300 transition">
                <input type="radio" name="payment" value="Card" class="accent-black">
                <div class="flex items-center gap-3">
                  <i class="fas fa-credit-card text-blue-600 text-xl"></i>
                  <div>
                    <p class="font-semibold text-sm">Credit / Debit Card</p>
                    <p class="text-xs text-gray-500">Visa, Mastercard, etc.</p>
                  </div>
                </div>
              </label>
              <label class="flex items-center gap-4 p-4 border-2 border-gray-200 rounded-2xl cursor-pointer hover:border-gray-300 transition">
                <input type="radio" name="payment" value="PayPal" class="accent-black">
                <div class="flex items-center gap-3">
                  <i class="fab fa-paypal text-blue-700 text-xl"></i>
                  <div>
                    <p class="font-semibold text-sm">PayPal</p>
                    <p class="text-xs text-gray-500">Fast and secure checkout</p>
                  </div>
                </div>
              </label>
            </div>
          </div>

          <!-- Error -->
          <div id="checkoutError" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-2xl px-4 py-3 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i><span id="checkoutErrorText"></span>
          </div>

          <button type="submit" id="placeOrderBtn"
            class="w-full bg-black text-white py-4 rounded-2xl font-bold text-base hover:bg-gray-800 transition flex items-center justify-center gap-2">
            <i class="fas fa-lock text-sm"></i> Place Order
          </button>
        </form>
      </div>

      <!-- Order Summary Sidebar -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-3xl border border-gray-200 p-6 sticky top-6">
          <h2 class="font-bold text-lg mb-5">Order Summary</h2>
          <div id="checkoutItems" class="space-y-4 mb-5 max-h-60 overflow-y-auto pr-1"></div>
          <div class="border-t pt-4 space-y-2 text-sm">
            <div class="flex justify-between text-gray-600"><span>Subtotal</span><span id="subtotalDisplay">-</span></div>
            <div class="flex justify-between text-gray-600"><span>Shipping</span><span id="shippingDisplay">-</span></div>
            <div class="flex justify-between font-bold text-base pt-2 border-t"><span>Total</span><span id="totalDisplay">-</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Success Modal -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-check text-green-600 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold mb-2">Order Placed!</h2>
      <p class="text-gray-600 text-sm mb-6">Thank you for your purchase. We'll send you an update once your order is on the way.</p>
      <a href="orders.html" class="block w-full bg-black text-white py-3.5 rounded-2xl font-semibold hover:bg-gray-800 transition mb-3">
        View My Orders
      </a>
      <a href="../index.html" class="block text-sm text-gray-500 hover:text-black transition">Back to Home</a>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000/api';

    function formatCurrency(n) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
    }

    function requireAuth() {
      const token = localStorage.getItem('token');
      if (!token) window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
    }
    requireAuth();

    // Load cart summary
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    if (cart.length === 0) window.location.href = 'cart.html';

    const subtotal = cart.reduce((t, i) => t + i.price * i.quantity, 0);
    const shipping = subtotal >= 100 ? 0 : 9.99;
    const total = subtotal + shipping;

    document.getElementById('subtotalDisplay').textContent = formatCurrency(subtotal);
    document.getElementById('shippingDisplay').textContent = shipping === 0 ? 'FREE' : formatCurrency(shipping);
    document.getElementById('totalDisplay').textContent = formatCurrency(total);

    document.getElementById('checkoutItems').innerHTML = cart.map(item => `
      <div class="flex items-center gap-3">
        <div class="relative flex-shrink-0">
          <img src="${item.image || 'https://via.placeholder.com/60'}" class="w-12 h-12 rounded-xl object-cover bg-gray-100">
          <span class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-gray-600 text-white rounded-full text-xs flex items-center justify-center">${item.quantity}</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate">${item.name}</p>
          ${item.size ? `<p class="text-xs text-gray-400">${item.size}</p>` : ''}
        </div>
        <span class="text-sm font-semibold">${formatCurrency(item.price * item.quantity)}</span>
      </div>`).join('');

    // Pre-fill from user
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (user) document.getElementById('fullName').value = user.name || '';

    // Payment radio styling
    document.querySelectorAll('input[name="payment"]').forEach(radio => {
      radio.addEventListener('change', function() {
        document.querySelectorAll('input[name="payment"]').forEach(r => {
          r.closest('label').classList.remove('border-black', 'bg-gray-50');
          r.closest('label').classList.add('border-gray-200');
        });
        this.closest('label').classList.add('border-black', 'bg-gray-50');
        this.closest('label').classList.remove('border-gray-200');
      });
    });

    // Submit
    document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('placeOrderBtn');
      const errBanner = document.getElementById('checkoutError');
      const errText = document.getElementById('checkoutErrorText');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Placing Order...';
      errBanner.classList.add('hidden');

      const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

      const orderData = {
        orderItems: cart.map(i => ({
          product: i.id,
          name: i.name,
          quantity: i.quantity,
          price: i.price,
          image: i.image,
          size: i.size,
          color: i.color
        })),
        shippingAddress: {
          fullName: document.getElementById('fullName').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          postalCode: document.getElementById('postalCode').value,
          country: document.getElementById('country').value,
          phone: document.getElementById('phone').value
        },
        paymentMethod,
        itemsPrice: subtotal,
        shippingPrice: shipping,
        totalPrice: total
      };

      try {
        const res = await fetch(`${API}/orders`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('token')
          },
          body: JSON.stringify(orderData)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Order failed');

        localStorage.removeItem('cart');
        document.getElementById('successModal').classList.remove('hidden');
      } catch (err) {
        errText.textContent = err.message;
        errBanner.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock text-sm"></i> Place Order';
      }
    });
  </script>
</body>
</html>
